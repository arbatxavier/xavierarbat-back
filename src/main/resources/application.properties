spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xavierarbat_db}?stringtype=unspecified
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Admin credentials (override via environment variables in production)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin}

# JWT settings
app.jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars-long!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Image uploads
app.uploads.path=${UPLOADS_PATH:/app/uploads}
app.uploads.max-size=20971520
app.uploads.allowed-types=image/jpeg,image/png,image/webp,image/gif,image/svg+xml
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
