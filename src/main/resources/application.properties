spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/xavierarbat_db?stringtype=unspecified
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Admin API Key (override via environment variable in production)
app.api-key=${API_KEY:change-me-in-production}
